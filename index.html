<!DOCTYPE html>
<html>
<head>
<title>Click & Earn</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
height:100vh;
color:white;

background:linear-gradient(45deg,#ff0000,#ff9900,#00ccff,#00ff99,#cc00ff);
background-size:400% 400%;
animation:bg 8s infinite alternate;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.container{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
}

input{
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
margin:10px;
width:220px;
}

button{
padding:14px 30px;
font-size:18px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.earnBtn{
font-size:22px;
padding:18px 40px;
background:#000;
margin-top:20px;
}

.box{
background:rgba(0,0,0,0.5);
padding:20px;
border-radius:12px;
margin-top:20px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div id="login" class="container">

<h2>Login</h2>

<input id="upi" placeholder="Enter UPI ID">

<button onclick="login()">Login</button>

</div>


<!-- MAIN PAGE -->

<div id="main" class="container" style="display:none">

<h1>Click & Earn 💰</h1>

<div class="box">

<h3>Must Follow & Earn</h3>

<p>1️⃣ Install the App</p>
<p>2️⃣ Register the App</p>
<p>3️⃣ Make Purchase ₹1</p>

</div>

<button class="earnBtn" onclick="earn()">🔘 Click & Earn</button>

</div>


<script>

function login(){

let upi=document.getElementById("upi").value

if(upi==""){
alert("Enter UPI ID")
return
}

localStorage.setItem("userUpi",upi)

document.getElementById("login").style.display="none"
document.getElementById("main").style.display="flex"

}

function earn(){

window.location.href="https://app-api.kickcash.in/api/v1/6590ACAD0A86BB6e8:g:Bji7gAiC:A8A"

}

</script>

</body>
</html>
